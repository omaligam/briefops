<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BriefOps — Experience</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#030308;overflow-x:hidden;font-family:'Space Mono',monospace}
  #scroll-space{height:500vh}
  #c{position:fixed;inset:0;z-index:0}
  .overlay{position:fixed;inset:0;z-index:2;pointer-events:none;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 6vw}
  .eyebrow{font-size:clamp(10px,1.4vw,13px);letter-spacing:0.35em;color:rgba(232,163,61,0.85);text-transform:uppercase;margin-bottom:26px;opacity:0;animation:fadeUp 1.2s 0.5s forwards}
  h1{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:clamp(34px,6.5vw,84px);color:#f0e6c8;line-height:1.05;letter-spacing:-0.02em;text-shadow:0 0 60px rgba(143,176,255,0.35);opacity:0;animation:fadeUp 1.2s 0.9s forwards}
  #slogan{margin-top:34px;font-size:clamp(14px,2vw,20px);color:rgba(240,230,200,0.9);min-height:1.6em;letter-spacing:0.02em}
  #slogan .cursor{display:inline-block;width:0.55em;height:1.1em;background:#e8a33d;vertical-align:text-bottom;margin-left:2px;animation:blink 0.9s steps(1) infinite}
  .hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:2;color:rgba(240,230,200,0.45);font-size:11px;letter-spacing:0.25em;text-transform:uppercase;animation:pulse 2.4s ease-in-out infinite;pointer-events:none}
  .stage-label{position:fixed;bottom:30px;right:34px;z-index:2;color:rgba(232,163,61,0.6);font-size:11px;letter-spacing:0.2em;pointer-events:none}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes blink{50%{opacity:0}}
  @keyframes pulse{0%,100%{opacity:0.45}50%{opacity:0.15}}
</style>
</head>
<body>
<div id="scroll-space"></div>
<canvas id="c"></canvas>
<div class="overlay">
  <div class="eyebrow">BriefOps · Market Intelligence</div>
  <h1>BriefOps</h1>
  <div id="slogan"><span id="slogan-text"></span><span class="cursor"></span></div>
</div>
<div class="hint">Scroll · Mueve el mouse · Haz click</div>
<div class="stage-label" id="stage-label">FASE 01 — TOROIDE</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {FilmPass} from 'three/addons/postprocessing/FilmPass.js';
import {AfterimagePass} from 'three/addons/postprocessing/AfterimagePass.js';
import {ShaderPass} from 'three/addons/postprocessing/ShaderPass.js';

/* ============ CONFIG ============ */
const IS_MOBILE = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 720;
const COUNT = IS_MOBILE ? 1000 : 1500;
const STAGES = ['FASE 01 — TOROIDE','FASE 02 — ESFERA','FASE 03 — CUBO','FASE 04 — VÓRTICE'];
const SLOGAN = 'El brief que ve lo que tu cliente no ve.';

/* Colores por geometría: azul profundo → dorado → magenta → blanco */
const PALETTE = [new THREE.Color(0x2244dd), new THREE.Color(0xe8a33d), new THREE.Color(0xff0090), new THREE.Color(0xf8f8ff)];

/* ============ SCENE ============ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:false, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x030308, 0.028);
const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 0, 16);

/* ============ GEOMETRY TARGETS ============ */
function torusTargets(n){
  const a = new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const u = Math.random()*Math.PI*2, v = Math.random()*Math.PI*2;
    const R = 6, r = 2.2;
    a[i*3]   = (R + r*Math.cos(v))*Math.cos(u);
    a[i*3+1] = r*Math.sin(v);
    a[i*3+2] = (R + r*Math.cos(v))*Math.sin(u);
  }
  return a;
}
function sphereTargets(n){
  const a = new Float32Array(n*3);
  const phi = Math.PI*(3 - Math.sqrt(5));
  for(let i=0;i<n;i++){
    const y = 1 - (i/(n-1))*2;
    const rad = Math.sqrt(1 - y*y);
    const th = phi*i;
    const R = 7;
    a[i*3] = Math.cos(th)*rad*R;
    a[i*3+1] = y*R;
    a[i*3+2] = Math.sin(th)*rad*R;
  }
  return a;
}
function cubeTargets(n){
  const a = new Float32Array(n*3);
  const S = 5.4;
  for(let i=0;i<n;i++){
    const f = Math.floor(Math.random()*6);
    const u = (Math.random()*2-1)*S, v = (Math.random()*2-1)*S;
    let x,y,z;
    if(f===0){x= S;y=u;z=v} else if(f===1){x=-S;y=u;z=v}
    else if(f===2){y= S;x=u;z=v} else if(f===3){y=-S;x=u;z=v}
    else if(f===4){z= S;x=u;y=v} else {z=-S;x=u;y=v}
    a[i*3]=x; a[i*3+1]=y; a[i*3+2]=z;
  }
  return a;
}
function vortexTargets(n){
  const a = new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const t = i/n;
    const ang = t*Math.PI*14;
    const rad = 0.8 + t*8.5;
    a[i*3]   = Math.cos(ang)*rad;
    a[i*3+1] = (t-0.5)*16;
    a[i*3+2] = Math.sin(ang)*rad;
  }
  return a;
}
const TARGETS = [torusTargets(COUNT), sphereTargets(COUNT), cubeTargets(COUNT), vortexTargets(COUNT)];

/* ============ PARTICLES ============ */
const positions = new Float32Array(TARGETS[0]);           // posición actual
const velocities = new Float32Array(COUNT*3);             // para explosión con click
const sizes = new Float32Array(COUNT);
const seeds = new Float32Array(COUNT);
for(let i=0;i<COUNT;i++){ sizes[i] = 0.6 + Math.pow(Math.random(),3)*2.6; seeds[i] = Math.random()*100; }

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
geo.setAttribute('aSeed', new THREE.BufferAttribute(seeds, 1));

const uniforms = {
  uColor:  {value: PALETTE[0].clone()},
  uTime:   {value: 0},
  uPixelRatio: {value: Math.min(devicePixelRatio,2)}
};

/* Sprite circular con glow suave, dibujado en shader — sin texturas */
const mat = new THREE.ShaderMaterial({
  uniforms,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexShader: `
    attribute float aSize;
    attribute float aSeed;
    uniform float uTime;
    uniform float uPixelRatio;
    varying float vTwinkle;
    void main(){
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      float tw = 0.75 + 0.25*sin(uTime*2.0 + aSeed*7.0);
      vTwinkle = tw;
      gl_PointSize = aSize * tw * uPixelRatio * (160.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    uniform vec3 uColor;
    varying float vTwinkle;
    void main(){
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if(d > 0.5) discard;
      float core = smoothstep(0.5, 0.0, d);
      float glow = pow(core, 2.2);
      gl_FragColor = vec4(uColor * (0.55 + glow*1.6) * vTwinkle, core);
    }`
});
const points = new THREE.Points(geo, mat);
scene.add(points);

/* ============ POST-PROCESSING ============ */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const afterimage = new AfterimagePass(0.82);              // ESTELA
composer.addPass(afterimage);

const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.15, 0.65, 0.12); // GLOW
composer.addPass(bloom);

/* Distorsión de lente — se activa al scrollear */
const LensShader = {
  uniforms: { tDiffuse:{value:null}, uStrength:{value:0} },
  vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse; uniform float uStrength; varying vec2 vUv;
    void main(){
      vec2 c = vUv - 0.5;
      float r2 = dot(c,c);
      vec2 uv = vUv + c * r2 * uStrength * 2.2;
      float ca = uStrength * 0.35;                        /* aberración cromática */
      float rr = texture2D(tDiffuse, uv + c*ca*r2).r;
      float gg = texture2D(tDiffuse, uv).g;
      float bb = texture2D(tDiffuse, uv - c*ca*r2).b;
      gl_FragColor = vec4(rr, gg, bb, 1.0);
    }`
};
const lensPass = new ShaderPass(LensShader);
composer.addPass(lensPass);

const film = new FilmPass(0.28, 0.4, 1400, false);        // GRANO CINE
composer.addPass(film);

/* ============ INTERACCIÓN ============ */
const mouse = new THREE.Vector2(-99,-99);
const mouseWorld = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);

addEventListener('pointermove', e=>{
  mouse.x = (e.clientX/innerWidth)*2 - 1;
  mouse.y = -(e.clientY/innerHeight)*2 + 1;
});
addEventListener('pointerdown', ()=>{
  /* EXPLOSIÓN: impulso radial a todas las partículas */
  for(let i=0;i<COUNT;i++){
    const ix=i*3;
    const dx=positions[ix], dy=positions[ix+1], dz=positions[ix+2];
    const len=Math.hypot(dx,dy,dz)||1;
    const f = 0.85 + Math.random()*0.9;
    velocities[ix]   += (dx/len)*f;
    velocities[ix+1] += (dy/len)*f;
    velocities[ix+2] += (dz/len)*f;
  }
});

/* ============ SCROLL: morph + slogan + lente ============ */
let scrollT = 0, scrollVel = 0, lastScroll = 0;
function onScroll(){
  const max = document.body.scrollHeight - innerHeight;
  scrollT = Math.min(0.9999, Math.max(0, scrollY / max));
  scrollVel = Math.min(1, Math.abs(scrollY - lastScroll) / 60);
  lastScroll = scrollY;
}
addEventListener('scroll', onScroll, {passive:true});

const sloganEl = document.getElementById('slogan-text');
const stageEl = document.getElementById('stage-label');

/* ============ LOOP ============ */
const clock = new THREE.Clock();
const tmpColor = new THREE.Color();

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  uniforms.uTime.value = t;

  /* --- Morph según scroll: 4 segmentos --- */
  const seg = scrollT * 3;                 /* 0..3 */
  const idxA = Math.floor(seg);
  const idxB = Math.min(3, idxA + 1);
  const f = seg - idxA;
  const ease = f*f*(3-2*f);                /* smoothstep */
  const A = TARGETS[idxA], B = TARGETS[idxB];

  /* --- Mouse a coordenadas de mundo --- */
  raycaster.setFromCamera(mouse, camera);
  raycaster.ray.intersectPlane(plane, mouseWorld);

  for(let i=0;i<COUNT;i++){
    const ix = i*3;
    /* objetivo interpolado entre geometrías */
    const tx = A[ix]  *(1-ease) + B[ix]  *ease;
    const ty = A[ix+1]*(1-ease) + B[ix+1]*ease;
    const tz = A[ix+2]*(1-ease) + B[ix+2]*ease;

    /* resorte hacia el objetivo */
    velocities[ix]   += (tx - positions[ix])  *0.022;
    velocities[ix+1] += (ty - positions[ix+1])*0.022;
    velocities[ix+2] += (tz - positions[ix+2])*0.022;

    /* repulsión magnética del mouse */
    const mdx = positions[ix]-mouseWorld.x, mdy = positions[ix+1]-mouseWorld.y, mdz = positions[ix+2]-mouseWorld.z;
    const md2 = mdx*mdx+mdy*mdy+mdz*mdz;
    if(md2 < 16){
      const force = (1 - md2/16) * 0.14;
      const inv = 1/Math.sqrt(md2+0.001);
      velocities[ix]   += mdx*inv*force;
      velocities[ix+1] += mdy*inv*force;
      velocities[ix+2] += mdz*inv*force;
    }

    /* fricción + integración */
    velocities[ix]*=0.9; velocities[ix+1]*=0.9; velocities[ix+2]*=0.9;
    positions[ix]+=velocities[ix]; positions[ix+1]+=velocities[ix+1]; positions[ix+2]+=velocities[ix+2];
  }
  geo.attributes.position.needsUpdate = true;

  /* --- Color por geometría --- */
  tmpColor.copy(PALETTE[idxA]).lerp(PALETTE[idxB], ease);
  uniforms.uColor.value.copy(tmpColor);

  /* --- Rotación de la figura + cámara orbital con vértigo --- */
  points.rotation.y = t*0.12 + scrollT*Math.PI*2;
  points.rotation.x = Math.sin(t*0.07)*0.25;
  const camR = 15 + Math.sin(t*0.11)*2.5 + scrollT*4;
  camera.position.x = Math.sin(t*0.16)*camR*0.42;
  camera.position.y = Math.sin(t*0.09)*3.2 + Math.cos(scrollT*Math.PI*2)*1.5;
  camera.position.z = Math.cos(t*0.16)*camR*0.42 + camR*0.6;
  camera.lookAt(0,0,0);

  /* --- Lente: curvatura del espacio al scrollear --- */
  lensPass.uniforms.uStrength.value += (scrollVel*0.55 - lensPass.uniforms.uStrength.value)*0.08;
  scrollVel *= 0.92;

  /* --- Slogan máquina de escribir sincronizado al scroll --- */
  const chars = Math.round(Math.min(1, scrollT*2.2) * SLOGAN.length);
  const shown = SLOGAN.slice(0, chars);
  if(sloganEl.textContent !== shown) sloganEl.textContent = shown;

  /* --- Label de fase --- */
  const stage = STAGES[Math.min(3, Math.round(seg))];
  if(stageEl.textContent !== stage) stageEl.textContent = stage;

  composer.render();
}
animate();

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
